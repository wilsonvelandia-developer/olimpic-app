<section class="page">
  <div class="page__header">
    <h1 class="page__title">Analytics</h1>
    <p class="page__subtitle">Métricas visuales de la plataforma</p>
  </div>

  @if (isLoading()) { <app-loading-spinner label="Cargando métricas..." /> }

  @if (!isLoading()) {
    <div class="analytics-grid">
      <div class="chart-card">
        <app-donut-chart title="Partidos por estado" [data]="matchesByStatus()" />
      </div>
      <div class="chart-card">
        <app-donut-chart title="Pagos por método" [data]="paymentsByMethod()" />
      </div>
      <div class="chart-card chart-card--wide">
        <app-bar-chart title="Partidos por ronda" [data]="matchesByRound()" />
      </div>
    </div>
  }
</section>
