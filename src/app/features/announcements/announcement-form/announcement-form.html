<section class="page">
  <div class="page__header">
    <h1 class="page__title">{{ isEditMode() ? 'Editar comunicado' : 'Nuevo comunicado' }}</h1>
  </div>

  @if (isLoading()) { <app-loading-spinner label="Cargando comunicado..." /> }

  @if (!isLoading()) {
    <div class="form-card">
      @if (errorMessage()) { <div class="alert alert--error" role="alert">{{ errorMessage() }}</div> }

      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

        <h2 class="form-section-title">📢 Contenido</h2>
        <div class="form-grid">
          <div class="form-group form-group--full">
            <label class="form-label form-label--required" for="title">Título</label>
            <input id="title" type="text" class="form-control"
              [class.form-control--error]="isFieldInvalid('title')"
              formControlName="title" placeholder="Ej: Cambio de horario partido semifinal" maxlength="200" />
            @if (isFieldInvalid('title')) { <span class="form-error">{{ getFieldError('title') }}</span> }
          </div>

          <div class="form-group form-group--full">
            <label class="form-label form-label--required" for="content">Contenido</label>
            <textarea id="content" class="form-control"
              [class.form-control--error]="isFieldInvalid('content')"
              formControlName="content" placeholder="Escribe el contenido del comunicado..."
              rows="6" maxlength="5000"></textarea>
            @if (isFieldInvalid('content')) { <span class="form-error">{{ getFieldError('content') }}</span> }
          </div>

          <div class="form-group">
            <label class="form-label" for="priority">Prioridad</label>
            <select id="priority" class="form-control" formControlName="priority">
              @for (opt of priorityOptions; track opt.value) {
                <option [value]="opt.value">{{ opt.label }}</option>
              }
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="status">Estado</label>
            <select id="status" class="form-control" formControlName="status">
              @for (opt of statusOptions; track opt.value) {
                <option [value]="opt.value">{{ opt.label }}</option>
              }
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="tournamentId">Torneo (opcional)</label>
            <select id="tournamentId" class="form-control" formControlName="tournamentId">
              <option value="">General (todos los torneos)</option>
              @for (t of tournaments(); track t.id) {
                <option [value]="t.id">{{ t.name }}</option>
              }
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="imageUrl">Imagen (URL)</label>
            <input id="imageUrl" type="url" class="form-control"
              formControlName="imageUrl" placeholder="https://ejemplo.com/imagen.jpg" />
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn--secondary" (click)="onCancel()">Cancelar</button>
          <button type="submit" class="btn btn--primary" [disabled]="isSaving()">
            {{ isSaving() ? 'Guardando...' : (isEditMode() ? 'Guardar cambios' : 'Crear comunicado') }}
          </button>
        </div>
      </form>
    </div>
  }
</section>
