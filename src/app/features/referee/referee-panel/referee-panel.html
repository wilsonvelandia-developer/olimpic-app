@if (ref.isLoading()) {
  <div class="referee-panel referee-panel--loading">
    <app-loading-spinner />
  </div>
} @else if (ref.error()) {
  <div class="referee-panel referee-panel--error">
    <p class="referee-panel__error">{{ ref.error() }}</p>
    <button type="button" class="btn btn--secondary" (click)="goBack()">← Volver</button>
  </div>
} @else {
  <div class="referee-panel">
    <!-- Header bar -->
    <header class="referee-panel__header">
      <button type="button" class="referee-panel__back-btn" (click)="goBack()" aria-label="Volver">
        ←
      </button>
      <div class="referee-panel__header-info">
        <span class="referee-panel__match-status badge"
          [class.badge--success]="ref.matchStatus() === 'in_progress'"
          [class.badge--neutral]="ref.matchStatus() === 'scheduled'"
          [class.badge--info]="ref.matchStatus() === 'finished'"
        >{{ ref.matchStatus() }}</span>
      </div>
      <app-timer
        #timerRef
        [mode]="timerMode()"
        [countdownTarget]="countdownTarget()"
        [disabled]="ref.matchStatus() !== 'in_progress'"
        (paused)="onTimerPaused($event)"
        (finished)="onTimerFinished()"
      />
      <button
        type="button"
        class="referee-panel__mode-btn"
        (click)="toggleTimerMode()"
        [title]="timerMode() === 'progressive' ? 'Cambiar a cuenta regresiva' : 'Cambiar a progresivo'"
      >
        {{ timerMode() === 'progressive' ? '⏱↑' : '⏱↓' }}
      </button>
    </header>

    <!-- Scoreboard (main content area) -->
    <main class="referee-panel__main">
      @if (ref.matchStatus() === 'scheduled') {
        <div class="referee-panel__start-section">
          <p>El partido aún no ha comenzado</p>
          <button type="button" class="btn btn--secondary btn--lg" (click)="openSetup()">
            ⚙️ Configurar Partido
          </button>
          <button type="button" class="btn btn--primary btn--lg" (click)="onStartMatch()">
            ▶ Iniciar Partido
          </button>
        </div>
      } @else {
        <app-scoreboard
          [homeTeamName]="ref.homeTeamName()"
          [awayTeamName]="ref.awayTeamName()"
          [homeScore]="ref.currentPeriodHomeScore()"
          [awayScore]="ref.currentPeriodAwayScore()"
          [homeSetsWon]="ref.homeSetsWon()"
          [awaySetsWon]="ref.awaySetsWon()"
          [periodLabel]="ref.currentPeriodLabel()"
          [hasSets]="ref.hasSets()"
          [disabled]="ref.matchStatus() !== 'in_progress'"
          (homeScoreUp)="onHomeScoreUp()"
          (homeScoreDown)="onHomeScoreDown()"
          (awayScoreUp)="onAwayScoreUp()"
          (awayScoreDown)="onAwayScoreDown()"
        />
      }
    </main>

    <!-- Action bar -->
    @if (ref.matchStatus() === 'in_progress') {
      <footer class="referee-panel__actions">
        <button type="button" class="referee-panel__action-btn" (click)="openSubstitution('home')">
          <span class="referee-panel__action-icon">🔀</span>
          <span class="referee-panel__action-label">Cambio L</span>
        </button>
        <button type="button" class="referee-panel__action-btn" (click)="openSubstitution('away')">
          <span class="referee-panel__action-icon">🔀</span>
          <span class="referee-panel__action-label">Cambio V</span>
        </button>
        <button type="button" class="referee-panel__action-btn" (click)="openSanction('home')">
          <span class="referee-panel__action-icon">🟨</span>
          <span class="referee-panel__action-label">Sanción L</span>
        </button>
        <button type="button" class="referee-panel__action-btn" (click)="openSanction('away')">
          <span class="referee-panel__action-icon">🟨</span>
          <span class="referee-panel__action-label">Sanción V</span>
        </button>
        <button type="button" class="referee-panel__action-btn" (click)="toggleEventsLog()">
          <span class="referee-panel__action-icon">📋</span>
          <span class="referee-panel__action-label">Eventos</span>
        </button>
        <button type="button" class="referee-panel__action-btn" (click)="onEndPeriod()">
          <span class="referee-panel__action-icon">⏭</span>
          <span class="referee-panel__action-label">Fin Per.</span>
        </button>
        <button type="button" class="referee-panel__action-btn referee-panel__action-btn--danger" (click)="onFinishMatch()">
          <span class="referee-panel__action-icon">🏁</span>
          <span class="referee-panel__action-label">Finalizar</span>
        </button>
      </footer>
    }

    <!-- Events log panel -->
    <app-match-events-log
      [events]="ref.events()"
      [visible]="showEventsLog()"
    />
  </div>

  <!-- ═══ Dialogs ═══ -->

  <!-- Scorer Select -->
  <app-scorer-select
    [visible]="showScorerSelect()"
    [players]="ref.getPlayersOnCourt(scoringTeamSide())"
    [teamName]="scoringTeamName()"
    (playerSelected)="onScorerSelected($event)"
    (skipped)="onScorerSkipped()"
    (closed)="onScorerSkipped()"
  />

  <!-- Substitution Dialog -->
  <app-substitution-dialog
    [visible]="showSubstitution()"
    [playersOnCourt]="ref.getPlayersOnCourt(activeTeamSide())"
    [playersOnBench]="ref.getPlayersOnBench(activeTeamSide())"
    [teamName]="activeTeamName()"
    [teamId]="activeTeamId()"
    [currentMinute]="currentMinute()"
    [subsUsed]="ref.getSubsUsed(activeTeamSide())"
    [subsMax]="ref.subsMax()"
    (confirmed)="onSubstitutionConfirmed($event)"
    (closed)="onSubstitutionClosed()"
  />

  <!-- Sanction Dialog -->
  <app-sanction-dialog
    [visible]="showSanction()"
    [sanctionTypes]="ref.sanctionTypes()"
    [players]="ref.getPlayersOnCourt(activeTeamSide())"
    [teamName]="activeTeamName()"
    [teamId]="activeTeamId()"
    [currentMinute]="currentMinute()"
    (confirmed)="onSanctionConfirmed($event)"
    (closed)="onSanctionClosed()"
  />

  <!-- Match Setup Wizard -->
  <app-match-setup
    [visible]="showSetup()"
    [matchId]="id()"
    [homeTeam]="homeTeamPlayers()"
    [awayTeam]="awayTeamPlayers()"
    [hasSets]="ref.hasSets()"
    [sportSlug]="ref.sportSlug()"
    [playersPerTeam]="ref.playersPerTeam()"
    [minPlayersPerTeam]="ref.minPlayersPerTeam()"
    (completed)="onSetupCompleted($event)"
    (closed)="onSetupClosed()"
  />
}
