@if (visible()) {
  <aside class="events-log" aria-label="Match events timeline">
    <h3 class="events-log__title">Eventos del partido</h3>

    @if (events().length === 0) {
      <p class="events-log__empty">Sin eventos registrados</p>
    } @else {
      <ul class="events-log__list" role="list">
        @for (event of events(); track event.id) {
          <li class="events-log__item">
            <span class="events-log__icon">{{ getIcon(event.eventType) }}</span>
            <div class="events-log__content">
              <span class="events-log__label">{{ getLabel(event) }}</span>
              <span class="events-log__time">{{ formatTime(event) }} · P{{ event.periodNumber }}</span>
            </div>
          </li>
        }
      </ul>
    }
  </aside>
}
