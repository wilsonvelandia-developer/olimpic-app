<header class="navbar" role="banner">
  <div class="navbar__left">
    <button
      type="button"
      class="navbar__menu-btn"
      aria-label="Toggle sidebar menu"
      (click)="onMenuToggle()"
    >
      ☰
    </button>
    <span class="navbar__logo">OlimpicApp</span>
  </div>

  <nav class="navbar__right" aria-label="User menu">
    @if (currentUser()) {
      <button type="button" class="navbar__theme-btn" (click)="onOpenSearch()" aria-label="Búsqueda global" title="Buscar (Ctrl+K)">
        🔍
      </button>
      <app-notification-bell />
      <app-language-switcher />
      <button type="button" class="navbar__theme-btn" (click)="onToggleTheme()" aria-label="Toggle dark mode">
        {{ theme.currentTheme() === 'dark' ? '☀️' : '🌙' }}
      </button>
      <button type="button" class="navbar__theme-btn" (click)="onStartTour()" aria-label="Tour de ayuda" title="Tour de ayuda">
        ❓
      </button>
      <div class="navbar__user-info">
        <span class="navbar__user-name">{{ currentUser()!.name }}</span>
        <span class="navbar__role-badge">
          {{ currentUser()!.roles[0] }}
        </span>
      </div>
      <button type="button" class="navbar__logout-btn" (click)="onLogout()">
        Cerrar sesión
      </button>
    }
  </nav>
</header>

<app-global-search />
