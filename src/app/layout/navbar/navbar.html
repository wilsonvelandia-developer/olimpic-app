<header class="navbar" role="banner">
  <div class="navbar__left">
    <button
      type="button"
      class="navbar__menu-btn"
      aria-label="Toggle sidebar menu"
      (click)="onMenuToggle()"
    >
      ☰
    </button>
    <span class="navbar__logo">OlimpicApp</span>
  </div>

  <nav class="navbar__right" aria-label="User menu">
    @if (currentUser()) {
      <div class="navbar__user-info">
        <span class="navbar__user-name">{{ currentUser()!.name }}</span>
        <span class="navbar__role-badge">
          {{ currentUser()!.roles[0] }}
        </span>
      </div>
      <button type="button" class="navbar__logout-btn" (click)="onLogout()">
        Cerrar sesión
      </button>
    }
  </nav>
</header>
