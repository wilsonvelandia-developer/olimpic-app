<a class="skip-link" href="#main-content">Saltar al contenido principal</a>

<div class="shell" [class.shell--collapsed]="!isSidebarOpen()">
  <app-navbar (menuToggle)="toggleSidebar()" />

  <div class="shell__body">
    <app-sidebar data-tour="sidebar" [isOpen]="isSidebarOpen()" (linkClicked)="closeSidebarOnMobile()" />

    <!-- Backdrop for mobile overlay -->
    <div
      class="shell__backdrop"
      [class.shell__backdrop--visible]="isSidebarOpen()"
      (click)="closeSidebarOnMobile()"
      aria-hidden="true"
    ></div>

    <main id="main-content" class="shell__content" role="main" aria-label="Contenido principal">
      <router-outlet />
    </main>
  </div>
</div>

<!-- Onboarding tour overlay (renders globally above all content) -->
<app-onboarding-overlay />
